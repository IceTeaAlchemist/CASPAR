<html>
<head>

<button type="button" id="myPuck_connect" > Start/Stop PCR </button>
<button type="button" id="myrecord_start" > Start New Recording </button>
<button type="button" id="my_Savedata" > Save Date as  CSV - File </button>      
<button type="button" id="closeserver" > SHUTDOWN SERVER (DO NOT PRESS UNLESS YOU MEAN IT) </button>   
<input type="text" id="filename"> 
<button type="button" id="submitfilename" > Set save data filename </button>

<script src="https://www.puck-js.com/puck.js"></script>
<script src="https://code.jquery.com/jquery-1.9.1.min.js"></script>      
<script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script>
<script type="text/javascript" src="https://cdnjs.cloudflare.com/ajax/libs/dygraph/2.1.0/dygraph.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/dygraph/2.1.0/dygraph.css" />

</head>
<body>
<div id="div_g" style="width:1200px; height:600px;"></div>

PCR DATA:

<div id="div_pcr" style="width:1200px; height:600px;"></div>
<script type="text/javascript">
      const ws = new WebSocket('ws://10.8.129.234:7071/ws');
var rec_flag = false;
      var data = [];
      var data2 =[];
      var derivs = [];
      var start_time;
      var connection;
      var xconnect = document.getElementById("myPuck_connect");
      var savemy_CSV = document.getElementById("my_Savedata");
      var rec_startstop = document.getElementById("myrecord_start");
      var servershutdown = document.getElementById("closeserver"); 
      var taxis_increment = 10 * 1000;           /// axis increment in milliseconds
      var t = new Date();
      var x = 0;
      var y = 0;
      var y;
      var fam;
      var cy5;
      var cycleno = 0;
      var last = 0;
      data.push([t, 20, 30.0]);
      data2.push([cycleno, 0, 0]);
      derivs.push([t,10]);
      var date_win_min = t.getTime();
      var date_win_max = date_win_min + 2*taxis_increment;   
      ws.onmessage = function(event){
            var msg = JSON.parse(event.data);
            switch(msg.id){
                  case "connect":
                        console.log(msg.status);
                        break;
                  case "cycledata":
                        x = new Date();  // current time 
                        y = msg.fluor;
                        temp = msg.temp;
                        if ( x.getTime() >= date_win_max) {
                              date_win_min += taxis_increment;
                              date_win_max += taxis_increment;
                              g.updateOptions( { dateWindow : [date_win_min, date_win_max] } );
                        };
                        if(y > -100)
                        {
                              data.push([x,y,temp]);
                              g.updateOptions( { 'file': data } );
                              last = y;
                        };
                        break;
                  case "PCRdata":
                        cycleno = cycleno + 1;
                        fam = msg.fam;
                        cy5 = msg.cyfive;
                        data2.push([cycleno, fam, cy5]);
                        pcr.updateOptions( {'file': data2 } );
                        break;
                  case "filestatus":
                        console.log(msg.status);
                        break;
                  default:
                  console.log(msg);
            }
            // if ((data.length&15)==15) g.updateOptions( { 'file': data } );
      };
      
      var g = new Dygraph(document.getElementById("div_g"), data,
                          {
                                labels: ['Time','F','Temp'],
                                series: {
                                      'F': {
                                            axis:'y1'
                                      },
                                      'Temp': {
                                            axis:'y2'
                                      },
                                },
                                axes: {
                                      'y1': {
                                            
                                      },
                                      'y2': {
                                      },
                                },
                                
                            drawPoints: true,
                            showRoller: true,
                            digitsAfterDecimal: 3,
                            dateWindow: [date_win_min, date_win_max],
                            // valueRange: [980, 1020],
                            showRangeSelector: true
                          });
      var pcr = new Dygraph(document.getElementById("div_pcr"), data2,
                          {
                                labels: ['Cycle','FAM','Cy5'],
                                series: {
                                      'FAM': {
                                            axis:'y1'
                                      },
                                      'Cy5': {
                                            axis:'y1'
                                      },
                                },
                                axes: {
                                      'y1': {
                                            
                                      },
                                },
                                
                            drawPoints: true,
                            showRoller: true,
                            digitsAfterDecimal: 3,
                            dateWindow: [0,40],
                            //valueRange: [0, 40],
                            showRangeSelector: true
                          });

function setColor() {
  let x = document.body;
  x.style.backgroundColor = x.style.backgroundColor == "yellow" ? "pink" : "yellow";
  console.log(x.style.backgroundColor);
}

function changeFile()
{
      var nameforchange = document.getElementById("filename").value;
      var msg = {
            id: "filename",
            newname: nameforchange
      };
      ws.send(JSON.stringify(msg));
}

function checkFile() {
      if(rec_flag) {
                  x = new Date();  // current time 
                  $.ajax({
                        method: "POST",
                        url: "readfromfile3.php",
                        data: {mode: "2"},
                        dataType: 'json',
                        success:function(result){
                        y = parseFloat(result[0]);
                        temp = parseFloat(result[2]);
                        fluortemp = parseFloat(result[1]);
                        }
            });
            if ( x.getTime() >= date_win_max) {
                        date_win_min += taxis_increment;
                        date_win_max += taxis_increment;
                        g.updateOptions( { dateWindow : [date_win_min, date_win_max] } );
            };
            if(y > -100)
            {
                  data.push([x,y,temp,fluortemp]);
                  g.updateOptions( { 'file': data } );
                  last = y;
            };
            // if ((data.length&15)==15) g.updateOptions( { 'file': data } );
      };
}

function stopserver() {
      var msg = {
            id: "shutdown"
      };
      ws.send(JSON.stringify(msg));
}


$(document).ready(function () {
      // const myInterval = setInterval(setColor, 500);
      const fileCheck = setInterval(checkFile, 100);
   
      function startPCR() {
            var msg = {
                  id: "start/stop"
            };
             ws.send(JSON.stringify(msg)); 
      }   
      
      function dataAsk()
      {
            ws.send("Gimme.");
      }
      
      //const datarequest = setInterval(dataAsk,100);
      
function savemyCSV() {
      var csvContent = '';
      data.forEach(function(dataArray, index) {
            var diff_time = dataArray[0].getTime()-start_time;
            dataString = diff_time.toFixed(0) + ',' + dataArray[1].toFixed(3) + ',' + dataArray[2].toFixed(3);
            csvContent += index < data.length ? dataString + '\n' : dataString;
      });

      // The download function takes a CSV string, the filename and mimeType as parameters
      // Scroll/look down at the bottom of this snippet to see how download is called
      var download = function(content, fileName, mimeType) {
                  var a = document.createElement('a');
                  mimeType = mimeType || 'application/octet-stream';
                  if (navigator.msSaveBlob) { // IE10
                        navigator.msSaveBlob(new Blob([content], { type: mimeType }), fileName);
                  } else if (URL && 'download' in a) { //html5 A[download]
                   a.href = URL.createObjectURL(new Blob([content], { type: mimeType }));
    
                  a.setAttribute('download', fileName);
                  document.body.appendChild(a);
                  a.click();
                  document.body.removeChild(a);
                  } else {
                        location.href = 'data:application/octet-stream,' + encodeURIComponent(content); // only this mime type is supported
                  }
            }
            download(csvContent, 'Puck.csv', 'text/csv;encoding:utf-8');      
}     // end savemyCSV();

   
      xconnect.addEventListener("click", function () { startPCR() } );
      savemy_CSV.addEventListener("click", function () { savemyCSV() } );
      // rec_startstop.addEventListener("click", function () { startstop_record() } );
      servershutdown.addEventListener("click", function () { stopserver()});
      submitfilename.addEventListener("click", function() {changeFile()});
    });   
  

</script>
</body>
</html>
